name: Coffee Bean Crawler

on:
  schedule:
    - cron: '0 3 * * 1'  # 매주 월요일 03:00 UTC (한국시간 12:00)
  workflow_dispatch:
    inputs:
      cafe:
        description: '크롤링할 카페 (비워두면 모든 HTML 카페 실행)'
        required: false
        default: 'all'

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install webdriver-manager==4.0.2
      
      - name: Create dummy Firebase config
        run: |
          echo 'firebase:' > config/firebase_config.yaml
          echo '  credential_file: "your-service-account-key.json"' >> config/firebase_config.yaml
          echo '  database_url: "https://dummy-project.firebaseio.com"' >> config/firebase_config.yaml
          echo '  collection: "coffee_beans"' >> config/firebase_config.yaml
          echo '  disabled: true' >> config/firebase_config.yaml
      
      - name: Set environment variables
        run: |
          echo "GITHUB_ACTIONS=true" >> $GITHUB_ENV
          echo "DISABLE_FIREBASE=true" >> $GITHUB_ENV
          echo "USE_SELENIUM=false" >> $GITHUB_ENV
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
      
      - name: Create directories
        run: |
          mkdir -p data logs
      
      - name: Run crawler
        id: crawler
        run: |
          echo "start_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          
          # 실행할 카페 설정
          CAFE="all"
          if [ "${{ github.event.inputs.cafe }}" != "" ]; then
            CAFE="${{ github.event.inputs.cafe }}"
          fi
          
          echo "크롤링할 카페: $CAFE"
          echo "cafe=$CAFE" >> $GITHUB_OUTPUT
          
          # 날짜 형식 설정
          TODAY=$(date +%Y%m%d)
          echo "date=$TODAY" >> $GITHUB_OUTPUT
          
          # 크롤링 실행 (--dry-run 옵션으로 Firebase 저장 방지)
          # USE_SELENIUM=false 환경 변수로 인해 HTML 크롤링만 실행됨
          python -m scripts.run_crawler --cafe "$CAFE" --dry-run
          
          # 결과 확인
          TOTAL_BEAN_COUNT=0
          for JSON_FILE in data/beans_all_${TODAY}_*.json; do
            if [ -f "$JSON_FILE" ]; then
              CAFE_NAME=$(basename $JSON_FILE .json | sed "s/beans_all_${TODAY}_//")
              BEAN_COUNT=$(grep -o '"name":' "$JSON_FILE" | wc -l || echo 0)
              TOTAL_BEAN_COUNT=$((TOTAL_BEAN_COUNT + BEAN_COUNT))
              echo "$CAFE_NAME: $BEAN_COUNT개 원두 수집"
            fi
          done
          
          echo "총 수집된 원두 수: $TOTAL_BEAN_COUNT"
          echo "bean_count=$TOTAL_BEAN_COUNT" >> $GITHUB_OUTPUT
          
          echo "end_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
      
      - name: Save results to repository
        if: success() || failure()
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          git add data/*.json logs/*.log || echo "No files to add"
          
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "크롤링 결과 추가 (자동 실행 #${{ github.run_number }})" || echo "No changes to commit"
            git push || echo "Push failed"
          fi
      
      - name: Upload logs as artifacts
        if: always()
        uses: actions/upload-artifact@v2
        with:
          name: crawler-logs-${{ steps.crawler.outputs.date }}
          path: logs/*.log
          retention-days: 14
      
      - name: Send Slack notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,workflow,job,took
          text: |
            *커피 원두 크롤링 결과*
            
            *상태:* ${{ job.status == 'success' && '✅ 성공' || '❌ 실패' }}
            *실행 번호:* #${{ github.run_number }}
            *크롤링한 카페:* ${{ steps.crawler.outputs.cafe }}
            *시작 시간:* ${{ steps.crawler.outputs.start_time }}
            *종료 시간:* ${{ steps.crawler.outputs.end_time }}
            *수집된 원두 수:* ${{ steps.crawler.outputs.bean_count }}
            
            *결과 확인:* ${{ github.server_url }}/${{ github.repository }}/tree/main/data
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }} 
