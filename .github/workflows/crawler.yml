name: Coffee Bean Crawler

on:
  schedule:
    - cron: '0 3 * * 1'  # 매주 월요일 03:00 UTC (한국시간 12:00)
  workflow_dispatch:
    inputs:
      cafe:
        description: '크롤링할 카페 (비워두면 모든 HTML 카페 실행)'
        required: false
        default: 'all'

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install webdriver-manager==4.0.2
          pip install firebase-admin
      
      - name: Set up Firebase credentials
        run: |
          cat > config/firebase_config.yaml << EOL
          firebase:
            project_id: "coffee-37b81"
            auth_method: "key_file"
            key_file_path: "config/serviceAccountKey.json"
            firestore:
              collection_beans: "beans"
              collection_cafes: "cafes"
              collection_logs: "crawl_logs"
            storage:
              bucket_name: "coffee-37b81.appspot.com"
              image_path: "bean_images"
          EOL
          
          cat > config/serviceAccountKey.json << EOL
          {
            "type": "service_account",
            "project_id": "coffee-37b81",
            "private_key_id": "${{ secrets.FIREBASE_PRIVATE_KEY_ID }}",
            "private_key": "${{ secrets.FIREBASE_PRIVATE_KEY }}",
            "client_email": "${{ secrets.FIREBASE_CLIENT_EMAIL }}",
            "client_id": "${{ secrets.FIREBASE_CLIENT_ID }}",
            "auth_uri": "https://accounts.google.com/o/oauth2/auth",
            "token_uri": "https://oauth2.googleapis.com/token",
            "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
            "client_x509_cert_url": "${{ secrets.FIREBASE_CLIENT_CERT_URL }}"
          }
          EOL
      
      - name: Set environment variables
        run: |
          echo "GITHUB_ACTIONS=true" >> $GITHUB_ENV
          echo "USE_SELENIUM=false" >> $GITHUB_ENV
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
      
      - name: Create directories
        run: |
          mkdir -p data logs
      
      - name: Run crawler
        id: crawler
        run: |
          echo "start_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          
          # 실행할 카페 설정
          CAFE="all"
          if [ "${{ github.event.inputs.cafe }}" != "" ]; then
            CAFE="${{ github.event.inputs.cafe }}"
          fi
          
          echo "크롤링할 카페: $CAFE"
          echo "cafe=$CAFE" >> $GITHUB_OUTPUT
          
          # 날짜 형식 설정
          TODAY=$(date +%Y%m%d)
          echo "date=$TODAY" >> $GITHUB_OUTPUT
          
          # 크롤링 실행 (Firebase에 직접 저장)
          if [ "$CAFE" = "all" ]; then
            python -m scripts.run_crawler --all
          else
            python -m scripts.run_crawler --cafe "$CAFE"
          fi
          
          # 결과 확인
          TOTAL_BEAN_COUNT=0
          for JSON_FILE in data/beans_all_${TODAY}_*.json; do
            if [ -f "$JSON_FILE" ]; then
              CAFE_NAME=$(basename $JSON_FILE .json | sed "s/beans_all_${TODAY}_//")
              BEAN_COUNT=$(grep -o '"name":' "$JSON_FILE" | wc -l || echo 0)
              TOTAL_BEAN_COUNT=$((TOTAL_BEAN_COUNT + BEAN_COUNT))
              echo "$CAFE_NAME: $BEAN_COUNT개 원두 수집"
            fi
          done
          
          echo "총 수집된 원두 수: $TOTAL_BEAN_COUNT"
          echo "bean_count=$TOTAL_BEAN_COUNT" >> $GITHUB_OUTPUT
          
          echo "end_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
      
      - name: Save logs to repository
        if: success() || failure()
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          git add logs/*.log || echo "No files to add"
          
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "크롤링 로그 추가 (자동 실행 #${{ github.run_number }})" || echo "No changes to commit"
            git push || echo "Push failed"
          fi
      
      - name: Upload logs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawler-logs-${{ steps.crawler.outputs.date }}
          path: logs/*.log
          retention-days: 14
      
      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "*커피 원두 크롤링 결과*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*커피 원두 크롤링 결과*"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*상태:* ${{ job.status == 'success' && '✅ 성공' || '❌ 실패' }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*실행 번호:* #${{ github.run_number }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*크롤링한 카페:* ${{ steps.crawler.outputs.cafe }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*시작 시간:* ${{ steps.crawler.outputs.start_time }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*종료 시간:* ${{ steps.crawler.outputs.end_time }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*수집된 원두 수:* ${{ steps.crawler.outputs.bean_count }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*결과 확인:*\n- Firebase: https://console.firebase.google.com/project/coffee-37b81/firestore\n- 로그: ${{ github.server_url }}/${{ github.repository }}/tree/main/logs"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
