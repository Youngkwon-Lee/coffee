name: Coffee Bean Crawler

on:
  schedule:
    - cron: '0 3 * * 1'  # Žß§ž£ľ ?ĒžöĒ??03:00 UTC (?úÍĶ≠?úÍįĄ 12:00)
  workflow_dispatch:
    inputs:
      cafe:
        description: '?¨Ž°§ŽßĀŪē† žĻīŪéė (ŽĻĄžõĆ?źŽ©ī Ž™®Žď† HTML žĻīŪéė ?§ŪĖČ)'
        required: false
        default: 'all'

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          CHROME_VERSION=$(google-chrome --version | awk '{print $3}' | cut -d. -f1)
          CHROME_DRIVER_VERSION=$(wget -q "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_$CHROME_VERSION" -O -)
          echo "Chrome Version: $CHROME_VERSION, ChromeDriver Version: $CHROME_DRIVER_VERSION"
          wget -q "https://chromedriver.storage.googleapis.com/$CHROME_DRIVER_VERSION/chromedriver_linux64.zip"
          unzip chromedriver_linux64.zip
          chmod +x chromedriver
          sudo mv chromedriver /usr/local/bin/
          chromedriver --version
      
      - name: Create dummy Firebase config
        run: |
          echo 'firebase:' > config/firebase_config.yaml
          echo '  credential_file: "your-service-account-key.json"' >> config/firebase_config.yaml
          echo '  database_url: "https://dummy-project.firebaseio.com"' >> config/firebase_config.yaml
          echo '  collection: "coffee_beans"' >> config/firebase_config.yaml
          echo '  disabled: true' >> config/firebase_config.yaml
      
      - name: Set environment variables
        run: |
          echo "GITHUB_ACTIONS=true" >> $GITHUB_ENV
          echo "DISABLE_FIREBASE=true" >> $GITHUB_ENV
          echo "USE_SELENIUM=true" >> $GITHUB_ENV
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
          echo "SELENIUM_DRIVER_PATH=/usr/local/bin/chromedriver" >> $GITHUB_ENV
      
      - name: Create directories
        run: |
          mkdir -p data logs
      
      - name: Run crawler
        id: crawler
        run: |
          echo "start_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          
          # ?§ŪĖČ??žĻīŪéė ?§ž†ē
          CAFE="all"
          if [ "${{ github.event.inputs.cafe }}" != "" ]; then
            CAFE="${{ github.event.inputs.cafe }}"
          fi
          
          echo "?¨Ž°§ŽßĀŪē† žĻīŪéė: $CAFE"
          echo "cafe=$CAFE" >> $GITHUB_OUTPUT
          
          # ?†žßú ?ēžčĚ ?§ž†ē
          TODAY=$(date +%Y%m%d)
          echo "date=$TODAY" >> $GITHUB_OUTPUT
          
          # ?¨Ž°§Žß??§ŪĖČ (--dry-run ?ĶžÖė?ľŽ°ú Firebase ?Ä??Žį©ž?)
          python -m scripts.run_crawler --cafe "$CAFE" --dry-run
          
          # Í≤įÍ≥ľ ?ēžĚł
          TOTAL_BEAN_COUNT=0
          for JSON_FILE in data/beans_all_${TODAY}_*.json; do
            if [ -f "$JSON_FILE" ]; then
              CAFE_NAME=$(basename $JSON_FILE .json | sed "s/beans_all_${TODAY}_//")
              BEAN_COUNT=$(grep -o '"name":' "$JSON_FILE" | wc -l || echo 0)
              TOTAL_BEAN_COUNT=$((TOTAL_BEAN_COUNT + BEAN_COUNT))
              echo "$CAFE_NAME: $BEAN_COUNTÍį??źŽĎź ?ėžßĎ"
            fi
          done
          
          echo "žī??ėžßĎ???źŽĎź ?? $TOTAL_BEAN_COUNT"
          echo "bean_count=$TOTAL_BEAN_COUNT" >> $GITHUB_OUTPUT
          
          echo "end_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
      
      - name: Save results to repository
        if: success() || failure()
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          git add data/*.json logs/*.log || echo "No files to add"
          
          if git diff --staged --quiet; then
            echo "Ž≥ÄÍ≤Ĺžā¨???ÜžĚĆ"
          else
            git commit -m "?¨Ž°§Žß?Í≤įÍ≥ľ ž∂ĒÍ? (?źŽŹô ?§ŪĖČ #${{ github.run_number }})" || echo "No changes to commit"
            git push || echo "Push failed"
          fi
      
      - name: Upload logs as artifacts
        if: always()
        uses: actions/upload-artifact@v2
        with:
          name: crawler-logs-${{ steps.crawler.outputs.date }}
          path: logs/*.log
          retention-days: 14
      
      - name: Send Slack notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,workflow,job,took
          text: |
            *žĽ§ŪĒľ ?źŽĎź ?¨Ž°§Žß?Í≤įÍ≥ľ*
            
            *?ĀŪÉú:* ${{ job.status == 'success' && '???ĪÍ≥Ķ' || '???§ŪĆ®' }}
            *?§ŪĖČ Ž≤ąŪėł:* #${{ github.run_number }}
            *?¨Ž°§ŽßĀŪēú žĻīŪéė:* ${{ steps.crawler.outputs.cafe }}
            *?úžěĎ ?úÍįĄ:* ${{ steps.crawler.outputs.start_time }}
            *žĘÖŽ£Ć ?úÍįĄ:* ${{ steps.crawler.outputs.end_time }}
            *?ėžßĎ???źŽĎź ??* ${{ steps.crawler.outputs.bean_count }}
            
            *Í≤įÍ≥ľ ?ēžĚł:* ${{ github.server_url }}/${{ github.repository }}/tree/main/data
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }} 
