name: HTML Only Coffee Bean Crawlers

on:
  schedule:
    - cron: '0 2 * * 1'  # л§ӨмЈј ?”мҡ”??02:00 UTC (?ңкөӯ?ңк°„ 11:00)
  workflow_dispatch:

jobs:
  crawl_html_only:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create dummy Firebase config
        run: |
          echo 'firebase:' > config/firebase_config.yaml
          echo '  credential_file: "your-service-account-key.json"' >> config/firebase_config.yaml
          echo '  database_url: "https://dummy-project.firebaseio.com"' >> config/firebase_config.yaml
          echo '  collection: "coffee_beans"' >> config/firebase_config.yaml
          echo '  disabled: true' >> config/firebase_config.yaml
      
      - name: Set environment variables
        run: |
          echo "GITHUB_ACTIONS=true" >> $GITHUB_ENV
          echo "USE_SELENIUM=false" >> $GITHUB_ENV
          echo "DISABLE_FIREBASE=true" >> $GITHUB_ENV
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
      
      - name: Create directories
        run: |
          mkdir -p data logs
      
      - name: Run HTML-only crawlers
        id: crawler
        run: |
          # ?ңмһ‘ ?ңк°„ кё°лЎқ
          echo "start_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          
          # HTML кё°л°ҳ ?¬лЎӨ??м№ҙнҺҳ лӘ©лЎқ
          HTML_CAFES="fritz,terarosa,momoscoffee,tailorcoffee,elcafe,bonanza"
          echo "cafes=$HTML_CAFES" >> $GITHUB_OUTPUT
          
          # ?ӨлҠҳ ? м§ң ?Өм •
          TODAY=$(date +%Y%m%d)
          echo "date=$TODAY" >> $GITHUB_OUTPUT
          
          # ?¬лЎӨл§??Өн–ү
          python -m scripts.run_crawler --cafe "$HTML_CAFES" --dry-run
          
          # кІ°кіј ?•мқё
          TOTAL_BEAN_COUNT=0
          for JSON_FILE in data/beans_all_${TODAY}_*.json; do
            if [ -f "$JSON_FILE" ]; then
              CAFE_NAME=$(basename $JSON_FILE .json | sed "s/beans_all_${TODAY}_//")
              BEAN_COUNT=$(grep -o '"name":' "$JSON_FILE" | wc -l || echo 0)
              TOTAL_BEAN_COUNT=$((TOTAL_BEAN_COUNT + BEAN_COUNT))
              echo "$CAFE_NAME: $BEAN_COUNTк°??җл‘җ ?ҳм§‘"
            fi
          done
          
          echo "мҙ??ҳм§‘???җл‘җ ?? $TOTAL_BEAN_COUNT"
          echo "bean_count=$TOTAL_BEAN_COUNT" >> $GITHUB_OUTPUT
          
          echo "end_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
      
      - name: Save results to repository
        if: success() || failure()
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          git add data/*.json logs/*.log || echo "No files to add"
          
          if git diff --staged --quiet; then
            echo "ліҖкІҪмӮ¬???ҶмқҢ"
          else
            git commit -m "HTML ?¬лЎӨ??кІ°кіј м¶”к? (?җлҸҷ ?Өн–ү #${{ github.run_number }})" || echo "No changes to commit"
            git push || echo "Push failed"
          fi
      
      - name: Upload logs as artifacts
        if: always()
        uses: actions/upload-artifact@v2
        with:
          name: html-crawler-logs-${{ steps.crawler.outputs.date }}
          path: logs/*.log
          retention-days: 14 
      
      - name: Send Slack notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,workflow,job,took
          text: |
            *HTML кё°л°ҳ м»Өн”ј ?җл‘җ ?¬лЎӨл§?кІ°кіј*
            
            *?Ғнғң:* ${{ job.status == 'success' && '???ұкіө' || '???ӨнҢЁ' }}
            *?Өн–ү лІҲнҳё:* #${{ github.run_number }}
            *?¬лЎӨл§Ғн•ң м№ҙнҺҳ:* ${{ steps.crawler.outputs.cafes }}
            *?ңмһ‘ ?ңк°„:* ${{ steps.crawler.outputs.start_time }}
            *мў…лЈҢ ?ңк°„:* ${{ steps.crawler.outputs.end_time }}
            *?ҳм§‘???җл‘җ ??* ${{ steps.crawler.outputs.bean_count }}
            
            *кІ°кіј ?•мқё:* ${{ github.server_url }}/${{ github.repository }}/tree/main/data
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }} 
