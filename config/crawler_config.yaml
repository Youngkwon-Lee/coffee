    - "박스"
    - "선물"
    - "세트"
    - "기프트"
    - "gift"
    - "capsule"
    - "캡슐"
    - "드립백"
    - "드립 백"
    - "드립 페이퍼"
    - "핸드드립"
    - "accessories"
    - "악세사리"
    - "액세서리"
    - "커피용품"
    - "더치"
    - "콜드브루"
    - "cold brew"
    - "티백"
    - "tea bag"
    - "분쇄"
    - "비정기"
    - "원두정기"
    - "드립 팩"
    - "텀블러"
    - "머그"
    - "mug"
    # - "디카페인"
    # - "decaf"
    # - "디카페인"

# 데이터 저장 설정
storage:
  type: "firebase"  # firebase 또는 local
  local:
    output_dir: "data"
    image_dir: "data/images"
  firebase:
    collection_beans: "beans"
    collection_cafes: "cafes"
    collection_logs: "crawl_logs"
    storage_bucket: "trusty-bearing-428402-a7.appspot.com"
    image_path: "bean_images"

# 로깅 설정
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/crawler.log"
  max_size: 10485760  # 10MB
  backup_count: 5 