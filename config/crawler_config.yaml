# 크롤러 기본 설정
crawler:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36"
  request_timeout: 30
  retry_count: 3
  retry_delay: 5

# 카페별 크롤러 설정
cafes:
  centercoffee:
    label: "센터커피"
    type: "selenium"
    url: "https://centercoffee.co.kr/shop"
    product_url: "https://centercoffee.co.kr/shop"
    schedule: "0 0 * * 1"  # 매주 월요일 자정
    active: true
    headless: true
    wait_timeout: 10
    page_load_delay: 2
    pagination: true  # 페이지네이션 활성화
    max_pages: 5  # 최대 5페이지까지 탐색
    selectors:
      product_list_container: "div.shop-content"
      product_item: ".shop-item"
      product_link: "a"
      product_title: ".item-title"
      product_price: ".item-pay"
      product_image: "img"
      pagination_container: ".paging-block"
      next_page: "a"  # 페이지 번호 링크
      fetch_product_detail: true
      product_detail_container: "#prod_detail"
      product_description: ".product_detail"
      product_detail_images: "img"

  fritz:
    label: "프릳츠커피"
    type: "html"
    url: "https://m.fritz.co.kr/product/list.html?cate_no=48"
    schedule: "0 0 1 * *"  # 매월 1일 자정
    active: true
    selectors:
      product_list_container: ".column2"
      product_item: "li"
      product_link: ".box a"
      product_title: ".name"
      product_price: ".price"
      product_image: ".thumb img"

  namusairo:
    label: "나무사이로"
    type: "selenium"
    url: "https://www.namusairo.com/product/list.html?cate_no=84"
    schedule: "0 3 * * 3"  # 매주 수요일 03:00
    active: true
    headless: true
    wait_timeout: 10
    page_load_delay: 2
    selectors:
      product_list_container: ".prdList"
      product_item: ".item"
      product_link: ".thumbnail a"
      product_title: ".name"
      product_price: ".price"
      product_image: ".thumbnail img"
      pagination_container: ".ec-base-paginate"
      next_page: "a.next"
      fetch_product_detail: true
      product_detail_container: ".detail_area"
      product_description: "#prdDetail"
      product_detail_images: ".detail_area img"
      
  somacoffee:
    label: "소마커피"
    type: "selenium"
    url: "https://www.somacoffee.co.kr/product/list.html?cate_no=29"
    schedule: "0 4 * * 4"  # 매주 목요일 04:00
    active: true
    headless: true
    wait_timeout: 10
    page_load_delay: 2
    selectors:
      product_list_container: ".xans-product-normalmenu"
      product_item: ".xans-record-"
      product_link: ".name a"
      product_title: ".name"
      product_price: ".price"
      product_image: ".thumbnail img"
      pagination_container: ".xans-product-normalpaging"
      next_page: "a.next"
      fetch_product_detail: true
      product_detail_container: ".detailArea"
      product_description: "#prdDetail"
      product_detail_images: "#prdDetail img"
      
  anthracite:
    label: "앤트러사이트"
    type: "selenium"
    url: "https://www.anthracitecoffee.com/product/category/58"
    schedule: "0 5 * * 5"  # 매주 금요일 05:00
    active: true
    headless: true
    wait_timeout: 15
    page_load_delay: 3
    selectors:
      product_list_container: ".product-grid"
      product_item: ".grid-item"
      product_link: ".product-name a"
      product_title: ".product-name"
      product_price: ".product-price"
      product_image: ".img-container img"
      pagination_container: ".pagination"
      next_page: ".pagination-next"
      fetch_product_detail: true
      product_detail_container: ".product-detail"
      product_description: ".product-description"
      product_detail_images: ".product-images img"
      
  terarosa:
    label: "테라로사"
    type: "selenium"
    url: "https://terarosa.com/collections/coffee"
    schedule: "0 6 * * 6"  # 매주 토요일 06:00
    active: true
    headless: true
    wait_timeout: 15
    page_load_delay: 3
    selectors:
      product_list_container: ".ProductList"
      product_item: ".ProductItem"
      product_link: ".ProductItem__Title a"
      product_title: ".ProductItem__Title"
      product_price: ".ProductItem__Price"
      product_image: ".ProductItem__Image img"
      pagination_container: ".Pagination"
      next_page: ".Pagination__Next"
      fetch_product_detail: true
      product_detail_container: ".Product__Info"
      product_description: ".ProductMeta__Description"
      product_detail_images: ".Product__SlideItem img"

# 기본 필터링 설정
