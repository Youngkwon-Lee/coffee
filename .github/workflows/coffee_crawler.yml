name: Coffee Crawler Auto Update

on:
  # 매주 실행 (월요일 오전 9시 KST)
  schedule:
    - cron: '0 0 * * 1'
  
  # 수동 실행 가능
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in test mode (only sample data)'
        required: false
        default: false
        type: boolean
      specific_cafe:
        description: 'Run for specific cafe (optional)'
        required: false
        default: ''
        type: string

jobs:
  crawl-validate-and-apply:
    runs-on: ubuntu-latest
    env:
      ALLOW_ZERO_BRANDS: "벙커컴퍼니"
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install system dependencies
      if: ${{ github.event.inputs.test_mode != 'true' }}
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libglib2.0-0 libsm6 libxext6 libxrender-dev libgomp1 libglib2.0-dev
    
    - name: Install Python dependencies (test mode fast)
      if: ${{ github.event.inputs.test_mode == 'true' }}
      run: |
        pip install --upgrade pip
        pip install -r requirements.test.txt

    - name: Install Python dependencies (full)
      if: ${{ github.event.inputs.test_mode != 'true' }}
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Node dependencies
      run: |
        npm install
    
    - name: Setup Firebase credentials
      env:
        FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
      run: |
        echo "$FIREBASE_CREDENTIALS" > firebase_credentials.json
        export GOOGLE_APPLICATION_CREDENTIALS="firebase_credentials.json"

    - name: Ensure output directories
      run: |
        mkdir -p data reports logs
    
    - name: Run coffee crawler (all cafes, dry-run artifact only)
      if: ${{ github.event.inputs.specific_cafe == '' }}
      env:
        GOOGLE_APPLICATION_CREDENTIALS: "firebase_credentials.json"
        GITHUB_ACTIONS: "true"
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        CRAWL_RUN_META_PATH: reports/current_run_meta.json
      run: |
        if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
          python scripts/run_crawler.py --all --test --notify --dry-run --output data/beans_test.json
        else
          python scripts/run_crawler.py --all --notify --dry-run --output data/beans_production.json
        fi
    
    - name: Run coffee crawler (specific cafe, dry-run artifact only)
      if: ${{ github.event.inputs.specific_cafe != '' }}
      env:
        GOOGLE_APPLICATION_CREDENTIALS: "firebase_credentials.json"
        GITHUB_ACTIONS: "true"
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        CRAWL_RUN_META_PATH: reports/current_run_meta.json
      run: |
        if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
          python scripts/run_crawler.py --cafe ${{ github.event.inputs.specific_cafe }} --test --notify --dry-run --output data/beans_${{ github.event.inputs.specific_cafe }}.json
        else
          python scripts/run_crawler.py --cafe ${{ github.event.inputs.specific_cafe }} --notify --dry-run --output data/beans_${{ github.event.inputs.specific_cafe }}.json
        fi

    - name: Validate crawl output
      run: |
        if [ "${{ github.event.inputs.specific_cafe }}" = "" ]; then
          TARGET="data/beans_production.json"
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            TARGET="data/beans_test.json"
          fi
          python scripts/validate_crawl_output.py "$TARGET" --allow-zero "$ALLOW_ZERO_BRANDS" --report reports/validation_report.json
        else
          TARGET="data/beans_${{ github.event.inputs.specific_cafe }}.json"
          python scripts/validate_crawl_output.py "$TARGET" --report reports/validation_report.json
        fi

    - name: Apply validated crawl to Firestore (all cafes)
      if: ${{ github.event.inputs.test_mode != 'true' && github.event.inputs.specific_cafe == '' }}
      run: |
        node scripts/reset_all_active_cafes_from_crawl.mjs data/beans_production.json

    - name: Apply validated crawl to Firestore (specific cafe)
      if: ${{ github.event.inputs.test_mode != 'true' && github.event.inputs.specific_cafe != '' }}
      run: |
        BRAND=$(python - <<'PY'
        import yaml
        cfg = yaml.safe_load(open('config/crawler_config.yaml', encoding='utf-8'))
        cafe = "${{ github.event.inputs.specific_cafe }}"
        print(cfg['cafes'][cafe]['label'])
        PY
        )
        node scripts/reset_single_brand_from_crawl.mjs data/beans_${{ github.event.inputs.specific_cafe }}.json "$BRAND"
    
    - name: Generate summary report
      run: |
        python -c "
        import json
        import os
        from datetime import datetime
        
        # 결과 파일 찾기
        data_files = [f for f in os.listdir('data') if f.startswith('beans_') and f.endswith('.json')]
        
        total_beans = 0
        cafe_stats = {}
        
        for file in data_files:
            try:
                with open(f'data/{file}', 'r', encoding='utf-8') as f:
                    data = json.load(f)
                    count = len(data) if isinstance(data, list) else 0
                    total_beans += count
                    cafe_name = file.replace('beans_', '').replace('.json', '')
                    cafe_stats[cafe_name] = count
                    print(f'✅ {cafe_name}: {count}개 원두')
            except Exception as e:
                print(f'❌ {file} 처리 실패: {e}')
        
        print(f'📊 총 수집된 원두: {total_beans}개')
        print(f'🏪 처리된 카페: {len(cafe_stats)}개')
        
        # 리포트 생성
        report = {
            'timestamp': datetime.now().isoformat(),
            'total_beans': total_beans,
            'cafe_breakdown': cafe_stats,
            'github_actions': True
        }
        
        os.makedirs('reports', exist_ok=True)
        with open('reports/crawl_summary.json', 'w', encoding='utf-8') as f:
            json.dump(report, f, ensure_ascii=False, indent=2)
        
        print('📄 리포트 생성 완료: reports/crawl_summary.json')
        "

    - name: Build monitoring state
      if: always()
      env:
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        CRAWL_RUN_META_PATH: reports/current_run_meta.json
        CRAWL_VALIDATION_REPORT_PATH: reports/validation_report.json
        CRAWL_SUMMARY_PATH: reports/crawl_summary.json
        CRAWL_MONITOR_STATE_PATH: reports/crawl_monitor_state.json
      run: |
        python scripts/build_crawl_monitor_state.py
    
    - name: Send Notion summary
      id: notion_sync
      if: always()
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        WORKFLOW_STATUS: ${{ job.status }}
      run: |
        python scripts/post_notion_summary.py

    - name: Upload crawl results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: crawl-results-${{ github.run_number }}
        path: |
          data/
          reports/
          logs/
        retention-days: 30
    
    - name: Send Discord notification
      if: always()
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        DISCORD_THREAD_ID: ${{ secrets.DISCORD_THREAD_ID }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        NOTION_RESULT: ${{ steps.notion_sync.outcome }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
      run: |
        if [ -n "$DISCORD_WEBHOOK" ] && [ -f "reports/crawl_summary.json" ]; then
          python -c "
          import json
          import requests
          import os
          from datetime import datetime
          
          webhook_url = os.getenv('DISCORD_WEBHOOK')
          thread_id = os.getenv('DISCORD_THREAD_ID', '').strip()
          run_url = os.getenv('RUN_URL', '').strip()
          notion_result = os.getenv('NOTION_RESULT', 'unknown').strip()
          notion_token = os.getenv('NOTION_TOKEN', '').strip()
          notion_db_id = os.getenv('NOTION_DB_ID', '').strip()
          monitor_state_path = 'reports/crawl_monitor_state.json'
          today = datetime.now().strftime('%Y-%m-%d')
          target_url = webhook_url
          if thread_id:
              sep = '&' if '?' in webhook_url else '?'
              target_url = f"{webhook_url}{sep}thread_id={thread_id}"

          def fetch_previous_summary_total():
              if not notion_token or not notion_db_id:
                  return None
              headers = {
                  'Authorization': f'Bearer {notion_token}',
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json',
              }
              payload = {
                  'page_size': 10,
                  'filter': {
                      'property': 'Type',
                      'select': {'equals': 'summary'}
                  },
                  'sorts': [
                      {'property': 'Date', 'direction': 'descending'}
                  ]
              }
              try:
                  res = requests.post(
                      f'https://api.notion.com/v1/databases/{notion_db_id}/query',
                      headers=headers,
                      json=payload,
                      timeout=20,
                  )
                  res.raise_for_status()
                  data = res.json()
                  for row in data.get('results', []):
                      props = row.get('properties', {})
                      date_prop = props.get('Date', {}).get('date') or {}
                      row_date = date_prop.get('start') or ''
                      if row_date == today:
                          continue
                      total_prop = props.get('Total', {}).get('number')
                      if total_prop is not None:
                          return int(total_prop)
                  return None
              except Exception as notion_err:
                  print(f'⚠️ 이전 summary 조회 실패: {notion_err}')
                  return None

          try:
              with open('reports/crawl_summary.json', 'r', encoding='utf-8') as f:
                  report = json.load(f)
              monitor_state = {}
              if os.path.exists(monitor_state_path):
                  with open(monitor_state_path, 'r', encoding='utf-8') as f:
                      monitor_state = json.load(f)
              
              total = report.get('total_beans', 0)
              cafes = report.get('cafe_breakdown', {})
              cafe_items = sorted(cafes.items(), key=lambda x: x[1], reverse=True)
              cafe_count = len(cafe_items)
              expected_cafes = 17
              missing_count = max(expected_cafes - cafe_count, 0)
              min_count = min((count for _, count in cafe_items), default=0)
              prev_total = fetch_previous_summary_total()
              delta_text = '전주 비교 없음'
              if prev_total is not None:
                  delta = total - prev_total
                  sign = '+' if delta > 0 else ''
                  delta_text = f'전주 대비 {sign}{delta}개 (이전 {prev_total}개)'
              
              if total >= 180 and cafe_count >= 12:
                  status_emoji = '✅'
                  status_text = '정상'
                  color = 0x2ecc71
              elif total >= 80:
                  status_emoji = '⚠️'
                  status_text = '주의'
                  color = 0xf1c40f
              else:
                  status_emoji = '❌'
                  status_text = '점검 필요'
                  color = 0xe74c3c
              
              top_lines = [f'• {cafe}: {count}개' for cafe, count in cafe_items[:8]]
              cafe_text = '\n'.join(top_lines) if top_lines else '수집 데이터 없음'
              health_bits = [
                  f'처리 카페 {cafe_count}개',
                  f'총 원두 {total}개',
              ]
              if missing_count:
                  health_bits.append(f'미포함 추정 {missing_count}개')
              if min_count == 0 and cafe_count:
                  health_bits.append('0건 카페 존재 가능')
              monitor_totals = monitor_state.get('totals', {}) if isinstance(monitor_state, dict) else {}
              if monitor_totals:
                  health_bits.append(f"실패 {monitor_totals.get('failing', 0)}개")
                  health_bits.append(f"stale {monitor_totals.get('stale', 0)}개")
                  top_priority_failing = monitor_totals.get('top_priority_failing', 0)
                  if top_priority_failing:
                      health_bits.append(f"top priority 실패 {top_priority_failing}개")
              summary_text = ' / '.join(health_bits)
              summary_text = f"{summary_text} / {delta_text}"
              
              embed = {
                  'title': f'{status_emoji} 커피 크롤러 주간 실행 리포트',
                  'description': f'상태: **{status_text}**\n{summary_text}',
                  'color': color,
                  'timestamp': datetime.now().isoformat(),
                  'fields': [
                      {
                          'name': '📌 운영 체크',
                          'value': f'Notion: `{notion_result}`\nRun: {run_url if run_url else "없음"}',
                          'inline': False
                      },
                      {
                          'name': '🏪 상위 수집 카페',
                          'value': cafe_text,
                          'inline': False
                      },
                      {
                          'name': '🧭 해석 가이드',
                          'value': '총 원두 수 급감, 처리 카페 수 감소, 특정 카페 0건이면 validation/artifact 확인 권장',
                          'inline': False
                      }
                  ],
                  'footer': {
                      'text': 'GitHub Actions 주간 자동 실행'
                  }
              }
              
              payload = {'embeds': [embed]}
              alerts = monitor_state.get('alerts', []) if isinstance(monitor_state, dict) else []
              if alerts:
                  alert_lines = []
                  for row in alerts[:8]:
                      line = f"• {row.get('label', row.get('cafe_id', 'unknown'))}"
                      parts = []
                      if row.get('priority'):
                          parts.append(str(row.get('priority')))
                      if row.get('consecutive_failures') is not None:
                          parts.append(f"{row.get('consecutive_failures')}회 연속 실패")
                      if row.get('last_error_type'):
                          parts.append(f"오류: {row.get('last_error_type')}")
                      if row.get('last_success_at'):
                          parts.append(f"최근 성공: {row.get('last_success_at')}")
                      if row.get('last_failure_at'):
                          parts.append(f"최근 실패: {row.get('last_failure_at')}")
                      if parts:
                          line += ' — ' + ' / '.join(parts)
                      alert_lines.append(line)

                  alert_embed = {
                      'title': '🚨 커피 크롤러 지속 실패 알림',
                      'description': '3회 연속 실패 기준을 넘긴 카페가 있습니다.',
                      'color': 0xe74c3c,
                      'timestamp': datetime.now().isoformat(),
                      'fields': [
                          {
                              'name': '대상 카페',
                              'value': '\n'.join(alert_lines) if alert_lines else '없음',
                              'inline': False
                          },
                          {
                              'name': '바로가기',
                              'value': f"Run: {run_url if run_url else '없음'}\nDashboard: /admin/crawl-monitor",
                              'inline': False
                          }
                      ],
                      'footer': {
                          'text': 'Persistent failure threshold reached'
                      }
                  }
                  payload = {'embeds': [embed, alert_embed]}

              response = requests.post(target_url, json=payload, timeout=20)
              
              if response.status_code == 204:
                  print('✅ Discord 알림 전송 완료')
              else:
                  print(f'❌ Discord 알림 전송 실패: {response.status_code}')
                  
          except Exception as e:
              print(f'❌ 알림 처리 중 오류: {e}')
              # 오류 알림 전송
              error_embed = {
                  'title': '❌ 커피 크롤러 오류 발생',
                  'description': f'```{str(e)}```',
                  'color': 0xff0000,
                  'timestamp': datetime.now().isoformat()
              }
              requests.post(target_url, json={'embeds': [error_embed]}, timeout=20)
          "
        else
          echo "Discord 웹훅이 설정되지 않았거나 리포트 파일이 없습니다."
        fi
