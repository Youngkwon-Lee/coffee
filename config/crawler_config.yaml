# 크롤러 기본 설정
crawler:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36"
  request_timeout: 30
  retry_count: 3
  retry_delay: 5

# 카페별 크롤러 설정
cafes:
  centercoffee:
    label: "센터커피"
    type: "selenium"
    url: "https://centercoffee.co.kr/shop"
    product_url: "https://centercoffee.co.kr/shop"
    schedule: "0 0 * * 1"  # 매주 월요일 자정
    active: true
    headless: true
    wait_timeout: 10
    page_load_delay: 2
    pagination: true  # 페이지네이션 활성화
    max_pages: 5  # 최대 5페이지까지 탐색
    selectors:
      product_list_container: "div.shop-content"
      product_item: ".shop-item"
      product_link: "a"
      product_title: ".item-title"
      product_price: ".item-pay"
      product_image: "img"
      pagination_container: ".paging-block"
      next_page: "a"  # 페이지 번호 링크
      fetch_product_detail: true
      product_detail_container: "#prod_detail"
      product_description: ".product_detail"
      product_detail_images: "img"

  fritz:
    label: "프릳츠커피"
