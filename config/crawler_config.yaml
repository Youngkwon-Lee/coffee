    label: "센터커피"
    type: "html"
    url: "https://centercoffee.co.kr/67"
    schedule: "0 0 * * 1"
    active: true
    selectors:
      product_list_container: ".shop-grid"
      product_item: ".shop-item"
      product_link: "a.shop-item-thumb"
      product_title: ".shop-title"
      product_price: ".pay"
      product_image: "img.org_img"
      pagination_container: "nav.paging-block"
      next_page: "ul.pagination li:not(.active) a"

