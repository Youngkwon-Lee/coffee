name: Coffee Bean Crawler

on:
  schedule:
    - cron: '0 3 * * 1'  # 매주 월요일 03:00 UTC (한국시간 12:00)
  workflow_dispatch:  # 수동 실행 옵션
    inputs:
      cafe:
        description: '크롤링할 카페 (비워두면 모든 카페)'
        required: false
        default: ''

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Debug environment
        run: |
          echo "Current directory: $(pwd)"
          echo "List files: $(ls -la)"
          echo "Python version: $(python --version)"
          echo "System info: $(uname -a)"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Check Python setup
        run: |
          python --version
          pip --version
          echo "Python path: $(which python)"
          echo "Pip path: $(which pip)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          echo "Installing requirements.txt..."
          cat requirements.txt
          pip install -r requirements.txt
          echo "Installing additional packages..."
          pip install selenium webdriver-manager beautifulsoup4 requests

      - name: Create directories
        run: |
          echo "Creating directories manually"
          mkdir -p data logs secret
          ls -la

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@latest
        
      # 카페 선택 로직 간소화 - 기본적으로 모든 카페 크롤링
      - name: Decide cafe to crawl
        id: cafe
        run: |
          if [ "${{ github.event.inputs.cafe }}" != "" ]; then
            CAFE="${{ github.event.inputs.cafe }}"
            echo "cafe=$CAFE" >> $GITHUB_OUTPUT
            echo "크롤링할 카페: $CAFE (수동 지정)"
          else
            CAFE="all"
            echo "cafe=$CAFE" >> $GITHUB_OUTPUT
            echo "모든 카페 크롤링"
          fi

      - name: Run crawler
        id: crawler
        run: |
          echo "start_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          
          # 스크립트 존재 여부 확인
          if [ ! -f "scripts/run_crawler.py" ]; then
            echo "Error: scripts/run_crawler.py not found!"
            echo "Current directory: $(pwd)"
            echo "Files in scripts directory (if exists):"
            ls -la scripts/ || echo "scripts directory does not exist"
            exit 1
          fi
          
          # 날짜 형식의 결과 파일명 설정
          TODAY=$(date +%Y%m%d)
          echo "date=$TODAY" >> $GITHUB_OUTPUT
          
          if [ "${{ steps.cafe.outputs.cafe }}" == "all" ]; then
            echo "모든 카페 크롤링 시작"
            python scripts/run_crawler.py --all --output data/beans_all_${TODAY}.json
          elif [[ "${{ steps.cafe.outputs.cafe }}" == *","* ]]; then
            # 여러 카페가 쉼표로 구분된 경우
            IFS=',' read -ra CAFES <<< "${{ steps.cafe.outputs.cafe }}"
            for CAFE in "${CAFES[@]}"; do
              echo "크롤링: $CAFE"
              python scripts/run_crawler.py --cafe $CAFE --output data/${CAFE}_${TODAY}.json
            done
          else
            # 단일 카페
            echo "크롤링: ${{ steps.cafe.outputs.cafe }}"
            python scripts/run_crawler.py --cafe ${{ steps.cafe.outputs.cafe }} --output data/${{ steps.cafe.outputs.cafe }}_${TODAY}.json
          fi
          
          echo "end_time=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          
          # 결과 파일 목록 및 통계 확인
          echo "크롤링 결과 파일 목록:"
          ls -la data/ || echo "No data files found"
          
          # 원두 수 계산
          BEAN_COUNT=$(grep -o '"name":' data/*_${TODAY}.json 2>/dev/null | wc -l || echo 0)
          echo "bean_count=$BEAN_COUNT" >> $GITHUB_OUTPUT
          echo "총 수집된 원두 수: $BEAN_COUNT"
          
          # 결과 파일 내용 요약 (처음 10개 원두만)
          for file in data/*_${TODAY}.json; do
            if [ -f "$file" ]; then
              echo "=== $file 내용 요약 ==="
              grep -o '"name":"[^"]*"' "$file" | head -10
            fi
          done

      # 결과를 저장소에 커밋
      - name: Save results to repository
        if: success()
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/*.json || echo "No JSON files to add"
          git commit -m "크롤링 결과 추가 (자동 실행 #${{ github.run_number }})" || echo "No changes to commit"
          git push || echo "Push failed"

      # 슬랙 알림 전송
      - name: Send Slack notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,workflow,job,took
          text: |
            *커피 원두 크롤링 결과*
            
            *상태:* ${{ job.status == 'success' && '✅ 성공' || '❌ 실패' }}
            *실행 번호:* #${{ github.run_number }}
            *크롤링한 카페:* ${{ steps.cafe.outputs.cafe }}
            *시작 시간:* ${{ steps.crawler.outputs.start_time || 'N/A' }}
            *종료 시간:* ${{ steps.crawler.outputs.end_time || 'N/A' }}
            *수집된 원두 수:* ${{ steps.crawler.outputs.bean_count || '0' }}
            
            *결과 확인:* https://github.com/Youngkwon-Lee/coffee-crawler/tree/main/data
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          MATRIX_CONTEXT: ${{ toJson(matrix) }} 